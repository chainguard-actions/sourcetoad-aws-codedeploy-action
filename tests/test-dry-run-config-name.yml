name: Test dry run with codedeploy_config_name and custom_zip_flags
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          aws_region: 'us-east-1'
          s3_bucket: 'my-test-bucket'
          s3_folder: 'my-test-folder'
          codedeploy_name: 'my-app'
          codedeploy_group: 'my-group'
          codedeploy_config_name: 'CodeDeployDefault.AllAtOnce'
          custom_zip_flags: '-r'
          dry_run: 'true'
      - name: Assert zip_filename output is set
        env:
          ACTUAL: ${{ steps.action.outputs.zip_filename }}
        run: |
          echo "actual zip_filename: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected zip_filename to be set"
            exit 1
          fi
          echo "PASS"
